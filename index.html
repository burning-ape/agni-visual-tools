<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agni Visual Tools</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Browser-native visual tools for 3D & texture artists. Runs locally — nothing leaves your machine.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/agni.css">
</head>
<body>

<!-- ══ MAIN MENU ══ -->
<div id="main-menu">

  <div class="bat-top">
    <div class="bat-mark">
      <svg class="flame" viewBox="0 0 14 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M7 0 C7 4, 11 5, 11 9 C11 12, 9 14, 7 14 C5 14, 3 12, 3 9 C3 6, 5 5, 5 3 C5 4.5, 6 5, 7 5 Z" fill="#ff5a1f"/>
      </svg>
      <div class="wm">Agni<em>·</em>Visual Tools</div>
    </div>
    <div class="right">
      <span>v0.5 / 2026</span>
      <a class="bat-gh" href="https://github.com/burning-ape/agni-visual-tools" target="_blank" rel="noopener" title="GitHub" aria-label="GitHub repository">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56 0-.28-.01-1.02-.02-2-3.19.69-3.87-1.54-3.87-1.54-.52-1.33-1.28-1.68-1.28-1.68-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.25.73-1.54-2.55-.29-5.23-1.27-5.23-5.66 0-1.25.45-2.27 1.18-3.07-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.15 1.17.91-.25 1.89-.38 2.86-.39.97.01 1.95.14 2.86.39 2.19-1.48 3.15-1.17 3.15-1.17.62 1.58.23 2.75.11 3.04.73.8 1.18 1.82 1.18 3.07 0 4.4-2.69 5.37-5.25 5.65.41.35.78 1.05.78 2.11 0 1.52-.01 2.75-.01 3.12 0 .31.21.68.8.56C20.71 21.39 24 17.08 24 12 24 5.65 18.85.5 12 .5z"/>
        </svg>
      </a>
    </div>
  </div>

  <div class="bat-stage">
    <div class="bat-stage-head">
      <h1>Pick a tool<span class="dot">.</span></h1>
      <div class="sub">Eleven browser-native utilities</div>
    </div>

    <div class="bat-tools">
      <button class="bat-tool" onclick="launchEditor('texture')">
        <div class="bt-name">Texture Editor</div>
        <div class="bt-desc">Paint decals, clone-stamp and blur directly on FBX models.</div>
        <div class="bt-arrow">→</div>
      </button>
      <button class="bat-tool" onclick="launchEditor('uvcheck')">
        <div class="bt-name">UV Checker</div>
        <div class="bt-desc">Inspect UV layouts with checker patterns. Spot stretches, seams, density.</div>
        <div class="bt-arrow">→</div>
      </button>
      <button class="bat-tool" onclick="launchEditor('normalgen')">
        <div class="bt-name">Normal Map</div>
        <div class="bt-desc">Generate tangent-space normal maps from height or diffuse — Sobel filter, GPU-fast.</div>
        <div class="bt-arrow">→</div>
      </button>
      <button class="bat-tool" onclick="launchEditor('seamless')">
        <div class="bt-name">Seamless Maker</div>
        <div class="bt-desc">Turn any photo into a tileable texture. Offset, mirror, frequency blend.</div>
        <div class="bt-arrow">→</div>
      </button>
      <button class="bat-tool" onclick="launchEditor('channelpack')">
        <div class="bt-name">Channel Packer</div>
        <div class="bt-desc">Pack roughness, metallic, AO into RGB(A) — ORM, RMA, custom layouts.</div>
        <div class="bt-arrow">→</div>
      </button>
      <button class="bat-tool" onclick="launchEditor('atlas')">
        <div class="bt-name">Atlas Packer</div>
        <div class="bt-desc">Pack many sprites into one atlas. Outputs PNG + JSON coordinates.</div>
        <div class="bt-arrow">→</div>
      </button>
      <button class="bat-tool" onclick="launchEditor('bgremove')">
        <div class="bt-name">Background Remover</div>
        <div class="bt-desc">Erase any background. Runs locally — nothing leaves your machine.</div>
        <div class="bt-arrow">→</div>
      </button>
      <button class="bat-tool" onclick="launchEditor('colorreplace')">
        <div class="bt-name">Color Replacer</div>
        <div class="bt-desc">Swap any color range — HSL shift, LAB ΔE or GPU WebGL shader.</div>
        <div class="bt-arrow">→</div>
      </button>
      <button class="bat-tool" onclick="launchEditor('colormask')">
        <div class="bt-name">Color Masking</div>
        <div class="bt-desc">Isolate one color into a hard B&amp;W mask. HSL or LAB ΔE selection, edge feather and threshold.</div>
        <div class="bt-arrow">→</div>
      </button>
      <button class="bat-tool" onclick="launchEditor('resizer')">
        <div class="bt-name">Resizer</div>
        <div class="bt-desc">Batch resize with Lanczos / Mitchell filters. Power-of-two snap for game-dev.</div>
        <div class="bt-arrow">→</div>
      </button>
      <button class="bat-tool" onclick="launchEditor('maskgen')">
        <div class="bt-name">Mask Generator</div>
        <div class="bt-desc">Compose black-and-white masks with layers and noise generators.</div>
        <div class="bt-arrow">→</div>
      </button>
    </div>
  </div>

  <div class="bat-foot">
    <span>© Agni · 2026</span>
    <span>Browser-native · No telemetry</span>
  </div>

</div>

<!-- shared session store (used by Mask Generator + Texture Editor) -->
<script src="js/shared-session.js"></script>

<!-- importmap so any module-tool can use three / three addons consistently -->
<script type="importmap">
{"imports":{"three":"https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>

<!-- router — lazy loads each tool on demand -->
<script src="js/router.js"></script>

</body>
</html>
